<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rewriter Settings</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 14px;
        min-width: 280px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 10px;
      }

      label {
        font-size: 13px;
        font-weight: 600;
      }

      input[type="text"] {
        font-size: 13px;
        padding: 8px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .status {
        margin: 0;
        min-height: 18px;
        font-size: 12px;
        opacity: 0.8;
      }

      button {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Rewriter Settings</h1>
    <div class="field">
      <label for="replacement-text">Replacement word or phrase</label>
      <input id="replacement-text" type="text" placeholder="redacted" />
    </div>
    <div class="row">
      <input id="enabled" type="checkbox" />
      <label for="enabled">Enable rewrite</label>
    </div>
    <button id="save-button" type="button">Save</button>
    <p id="status" class="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
